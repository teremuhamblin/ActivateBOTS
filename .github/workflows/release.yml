name: Release
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create version tag
        run: |
          VERSION=$(date +"%Y.%m.%d")
          git tag -a "v$VERSION" -m "Automated release $VERSION"
          git push origin "v$VERSION"
